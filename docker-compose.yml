services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ourstory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ourstory}
      POSTGRES_DB: ${POSTGRES_DB:-ourstory}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
